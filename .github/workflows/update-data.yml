name: Update SEC 13F Data

on:
  schedule:
    - cron: '0 7 * * *'   # 7:00 AM UTC daily (after SEC overnight processing)
  workflow_dispatch:        # Manual trigger from Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Diagnose — dump EDGAR submissions JSON
        run: |
          python3 - <<'EOF'
          import urllib.request, json

          url = "https://data.sec.gov/submissions/CIK0002045724.json"
          req = urllib.request.Request(url, headers={
              "User-Agent": "situational-awareness-dashboard saransh.mega@gmail.com",
              "Host": "data.sec.gov",
          })
          with urllib.request.urlopen(req, timeout=30) as r:
              data = json.loads(r.read())

          print("=== Entity ===")
          print(f"name: {data.get('name')}")
          print(f"cik: {data.get('cik')}")

          recent = data.get("filings", {}).get("recent", {})
          forms = recent.get("form", [])
          accs  = recent.get("accessionNumber", [])
          dates = recent.get("filingDate", [])
          perds = recent.get("reportDate", [])
          print(f"\n=== Recent filings ({len(forms)} total) ===")
          for i in range(len(forms)):
              print(f"  {forms[i]:15s}  acc={accs[i]}  filed={dates[i]}  period={perds[i]}")

          files = data.get("filings", {}).get("files", [])
          print(f"\n=== Older filing pages: {files} ===")
          EOF

      - name: Fetch new 13F filings from SEC EDGAR
        run: python scripts/fetch_filings.py

      - name: Resolve CUSIP -> ticker symbols via OpenFIGI
        run: python scripts/resolve_tickers.py
        continue-on-error: true

      - name: Build dashboard JSON data
        run: python scripts/build_data.py

      - name: Commit updated data (if any changes)
        run: |
          git config user.name "sec-bot"
          git config user.email "bot@users.noreply.github.com"
          git diff --quiet data/ || (
            git add data/ &&
            git commit -m "data: 13F update $(date -u +%Y-%m-%d)" &&
            git push
          )

      - name: Copy site files to docs/
        run: |
          mkdir -p docs/data
          cp -r src/. docs/
          cp data/*.json docs/data/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
